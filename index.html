<title>🌴 발리 신혼여행 지도 — 강한 & 은비</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',-apple-system,sans-serif; background:#0f1117; color:#e8e0d4; display:flex; flex-direction:column; height:100vh; overflow:hidden; }

/* ── 헤더 ── */
#header {
  padding:12px 20px 10px; background:linear-gradient(135deg,#1a1f2e,#0f1117);
  border-bottom:1px solid #2a2f3e; display:flex; align-items:center; gap:12px; flex-wrap:wrap; flex-shrink:0;
}
#header h1 { font-size:15px; font-weight:700; color:#e8c87a; }
#header span { font-size:12px; color:#7a8099; }

/* ── 컨트롤 ── */
#controls {
  padding:8px 20px; background:#141820; border-bottom:1px solid #2a2f3e;
  display:flex; gap:6px; flex-wrap:wrap; align-items:center; flex-shrink:0;
}
.ctrl-label { font-size:10px; color:#7a8099; font-weight:700; letter-spacing:.5px; text-transform:uppercase; margin-right:2px; }
.day-btn {
  padding:4px 11px; border-radius:20px; border:1px solid #2a2f3e;
  background:#1a1f2e; color:#9da5b4; font-size:11px; font-weight:600; cursor:pointer; transition:all .2s;
}
.day-btn:hover { border-color:#e8c87a; color:#e8c87a; }
.day-btn.active { background:#e8c87a; color:#0f1117; border-color:#e8c87a; }
.day-btn.all.active { background:#4a90d9; color:#fff; border-color:#4a90d9; }
.cat-chip { padding:3px 9px; border-radius:20px; border:1.5px solid; font-size:11px; font-weight:600; cursor:pointer; transition:opacity .2s; opacity:.4; }
.cat-chip.active { opacity:1; }
.route-toggle { padding:4px 11px; border-radius:20px; border:1.5px solid #e8c87a; background:#1a1f2e; color:#e8c87a; font-size:11px; font-weight:600; cursor:pointer; transition:all .2s; }
.route-toggle.active { background:#e8c87a; color:#0f1117; }
.divider { width:1px; height:22px; background:#2a2f3e; margin:0 3px; }
.krw-toggle { padding:4px 10px; border-radius:20px; border:1.5px solid #4a90d9; background:#1a1f2e; color:#4a90d9; font-size:11px; font-weight:600; cursor:pointer; transition:all .2s; }
.krw-toggle.active { background:#4a90d9; color:#fff; }

/* ── 메인 영역 ── */
#main { display:flex; flex:1; overflow:hidden; }

/* ── 사이드패널 ── */
#panel {
  width:0; min-width:0; background:#141820; border-right:1px solid #2a2f3e;
  overflow:hidden; transition:width .3s ease; flex-shrink:0; display:flex; flex-direction:column;
}
#panel.open { width:340px; }
#panel-header {
  padding:14px 16px 10px; border-bottom:1px solid #2a2f3e;
  display:flex; align-items:flex-start; justify-content:space-between; flex-shrink:0;
}
#panel-title { font-size:14px; font-weight:700; color:#e8c87a; line-height:1.4; }
#panel-sub { font-size:11px; color:#7a8099; margin-top:3px; }
#panel-close { background:none; border:none; color:#7a8099; font-size:18px; cursor:pointer; padding:0 4px; line-height:1; flex-shrink:0; }
#panel-close:hover { color:#e8e0d4; }
#panel-summary {
  padding:8px 16px; background:#1a1f2e; border-bottom:1px solid #2a2f3e;
  font-size:11px; color:#9da5b4; display:flex; gap:16px; flex-shrink:0;
}
#panel-summary span { display:flex; align-items:center; gap:4px; }
#panel-list { overflow-y:auto; flex:1; }
#panel-list::-webkit-scrollbar { width:4px; }
#panel-list::-webkit-scrollbar-track { background:#141820; }
#panel-list::-webkit-scrollbar-thumb { background:#2a2f3e; border-radius:2px; }

/* ── 패널 아이템 ── */
.p-item {
  padding:12px 16px; border-bottom:1px solid #1f2535; cursor:pointer; transition:background .15s; display:flex; gap:10px;
}
.p-item:hover { background:#1a1f2e; }
.p-item.active { background:#1e2a3a; border-left:3px solid #e8c87a; }
.p-num {
  width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; flex-shrink:0; color:#0f1117; margin-top:1px;
}
.p-body { flex:1; min-width:0; }
.p-name { font-size:13px; font-weight:700; color:#e8e0d4; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.p-meta { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:4px; }
.p-cat { font-size:10px; color:#7a8099; }
.p-time { font-size:10px; color:#9da5b4; background:#1f2535; padding:1px 6px; border-radius:10px; }
.p-transport { font-size:11px; }
.p-desc { font-size:11px; color:#b0b8c8; line-height:1.45; margin-bottom:5px; }
.p-footer { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.p-rating { font-size:11px; color:#e8c87a; font-weight:600; }
.p-price { font-size:11px; color:#27ae60; font-weight:600; }
.p-badge-res { font-size:9px; background:#c0392b; color:#fff; padding:1px 5px; border-radius:8px; font-weight:700; }
.p-badge-opt { font-size:9px; background:#2a7a4a; color:#fff; padding:1px 5px; border-radius:8px; font-weight:700; }
.p-note { font-size:10px; color:#7a8099; margin-top:3px; line-height:1.4; }

/* ── 지도 ── */
#map { flex:1; }

/* ── Leaflet 팝업 ── */
.leaflet-popup-content-wrapper { background:#1a1f2e; color:#e8e0d4; border-radius:10px; box-shadow:0 8px 32px rgba(0,0,0,.6); border:1px solid #2a2f3e; }
.leaflet-popup-tip { background:#1a1f2e; }
.leaflet-popup-content { margin:0; }
.pop-inner { padding:12px 14px; min-width:200px; max-width:260px; }
.pop-cat { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:2px; }
.pop-name { font-size:13px; font-weight:700; color:#e8e0d4; margin-bottom:2px; }
.pop-addr { font-size:11px; color:#9da5b4; font-style:italic; margin-bottom:6px; }
.pop-notes { font-size:11px; color:#b0b8c8; line-height:1.5; border-top:1px solid #2a2f3e; padding-top:6px; }
.leaflet-popup-close-button { color:#7a8099 !important; }
</style>

// ── 상태
let activeDay = 'all';

let showRoutes = true;

let routeLayers = {};

// ═══════════════════════════════════════════════════════
// 3. 핀
// ═══════════════════════════════════════════════════════
function createIcon(cat, order) {
  const c = CAT[cat];
  const badge = (order != null)
    ? `<div style="position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:#0f1117;border:1.5px solid rgba(255,255,255,.6);color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;">${order}</div>`
    : '';
  return L.divIcon({
    html:`<div style="position:relative;width:32px;height:32px;">
      <div style="width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${c.color};border:2px solid rgba(255,255,255,.3);box-shadow:0 3px 12px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;">
        <span style="transform:rotate(45deg);font-size:14px;line-height:1">${c.emoji}</span>
      </div>${badge}</div>`,
    className:'', iconSize:[32,32], iconAnchor:[16,32], popupAnchor:[0,-34]
  });
}

function buildPopup(p) {
  const c = CAT[p.category];
  return `<div class="pop-inner">
    <div class="pop-cat" style="color:${c.color}">${c.emoji} ${c.label}</div>
    <div class="pop-name">${p.name}</div>
    <div class="pop-addr">📍 ${p.address}</div>
    <div class="pop-notes">${p.notes}</div>
  </div>`;
}

function getOrder(placeId, day) {
  const order = DAY_ORDER[day];
  if (!order) return null;
  const idx = order.indexOf(placeId);
  return idx >= 0 ? idx + 1 : null;
}

PLACES.forEach(p => {
  const m = L.marker([p.lat, p.lng], { icon: createIcon(p.category, null) })
    .bindPopup(buildPopup(p), { maxWidth:280 });
  m.on('click', () => {
    if (panelOpen && activeDay !== 'all') {
      highlightPanelItem(p.id);
    }
  });
  markers[p.id] = { marker:m, data:p };
  m.addTo(map);
});

// ═══════════════════════════════════════════════════════
// 4. 경로
// ═══════════════════════════════════════════════════════
function drawRoute(dayNum) {
  const r = ROUTES[dayNum];
  if (!r) return;
  const line = L.polyline(r.coords, { color:r.color, weight:3, opacity:.8, dashArray:r.dashes?'8,8':null, lineJoin:'round' }).addTo(map);
  const arrows = [];
  for (let i=0; i<r.coords.length-1; i++) {
    const from=r.coords[i], to=r.coords[i+1];
    const midLat=(from[0]+to[0])/2, midLng=(from[1]+to[1])/2;
    const angle=Math.atan2(to[1]-from[1], to[0]-from[0])*180/Math.PI;
    const a = L.marker([midLat,midLng],{
      icon:L.divIcon({ html:`<div style="color:${r.color};font-size:13px;transform:rotate(${angle}deg);opacity:.85;text-shadow:0 0 4px rgba(0,0,0,.8);">➤</div>`, className:'', iconSize:[16,16], iconAnchor:[8,8] }),
      interactive:false
    }).addTo(map);
    arrows.push(a);
  }
  routeLayers[dayNum] = { line, arrows };
}

function removeRoute(dayNum) {
  if (routeLayers[dayNum]) {
    map.removeLayer(routeLayers[dayNum].line);
    routeLayers[dayNum].arrows.forEach(a => map.removeLayer(a));
    delete routeLayers[dayNum];
  }
}

Object.keys(ROUTES).forEach(d => drawRoute(Number(d)));

// ═══════════════════════════════════════════════════════
// 5. 사이드패널
// ═══════════════════════════════════════════════════════
function formatPrice(p) {
  if (!p.priceIDR) return p.priceNote || '-';
  if (showKRW) {
    const krw = Math.round(p.priceIDR * IDR_TO_KRW / 100) * 100;
    return `₩${krw.toLocaleString()} <span style="color:#7a8099;font-weight:400">(${p.priceNote})</span>`;
  }
  return `Rp ${p.priceIDR.toLocaleString()} <span style="color:#7a8099;font-weight:400">(${p.priceNote})</span>`;
}

function renderPanel(day) {
  const order = DAY_ORDER[day] || [];
  const r = ROUTES[day];
  document.getElementById('panel-title').textContent = `${day}일차 · ${DAY_LABELS[day]}`;
  document.getElementById('panel-sub').textContent = r ? r.label : '';
  document.getElementById('sum-stops').textContent = `📍 ${order.length}곳`;
  document.getElementById('sum-dist').textContent = r ? `🚗 ${r.dist}` : '-';
  document.getElementById('sum-time').textContent = r ? `⏱️ ${r.duration}` : '-';

  const list = document.getElementById('panel-list');
  list.innerHTML = '';
  const dayColor = r ? r.color : '#e8c87a';

  order.forEach((id, idx) => {
    const p = PLACE_MAP[id];
    if (!p) return;
    const c = CAT[p.category];
    const num = idx + 1;
    const resBadge = p.reserve ? '<span class="p-badge-res">예약필수</span>' : '';
    const priceBadge = p.priceIDR > 0 ? `<span class="p-price">${formatPrice(p)}</span>` : (p.priceNote ? `<span style="font-size:11px;color:#27ae60">${p.priceNote}</span>` : '');
    const ratingBadge = p.rating && p.rating !== '-' ? `<span class="p-rating">⭐ ${p.rating}</span>` : '';

    const item = document.createElement('div');
    item.className = 'p-item';
    item.id = `pitem-${id}`;
    item.innerHTML = `
      <div class="p-num" style="background:${dayColor}">${num}</div>
      <div class="p-body">
        <div class="p-name">${p.name}</div>
        <div class="p-meta">
          <span class="p-cat" style="color:${c.color}">${c.emoji} ${c.label}</span>
          ${p.time ? `<span class="p-time">${p.time}</span>` : ''}
          ${p.transport ? `<span class="p-transport">${p.transport}</span>` : ''}
        </div>
        <div class="p-desc">${p.desc}</div>
        <div class="p-footer">${ratingBadge}${priceBadge}${resBadge}</div>
        ${p.notes ? `<div class="p-note">${p.notes}</div>` : ''}
      </div>`;

    // 번호 클릭 → 지도 flyTo + 팝업
    item.querySelector('.p-num').addEventListener('click', (e) => {
      e.stopPropagation();
      const mk = markers[id];
      if (mk) {
        map.flyTo([mk.data.lat, mk.data.lng], 16, { duration:0.8 });
        setTimeout(() => mk.marker.openPopup(), 900);
      }
    });

    // 아이템 클릭 → 지도 flyTo
    item.addEventListener('click', () => {
      const mk = markers[id];
      if (mk) {
        map.flyTo([mk.data.lat, mk.data.lng], 15, { duration:0.7 });
        setTimeout(() => mk.marker.openPopup(), 800);
        highlightPanelItem(id);
      }
    });

    list.appendChild(item);
  });
}

function highlightPanelItem(id) {
  document.querySelectorAll('.p-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`pitem-${id}`);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }
}

function openPanel(day) {
  panelOpen = true;
  document.getElementById('panel').classList.add('open');
  renderPanel(day);
  setTimeout(() => map.invalidateSize(), 320);
}

window.closePanel = function() {
  panelOpen = false;
  document.getElementById('panel').classList.remove('open');
  setTimeout(() => map.invalidateSize(), 320);
};

// ═══════════════════════════════════════════════════════
// 6. 마커 업데이트
// ═══════════════════════════════════════════════════════
function updateMarkers() {
  PLACES.forEach(p => {
    const { marker } = markers[p.id];
    const dayOk = activeDay === 'all' || p.day.includes(activeDay);
    const catOk = activeCats.has(p.category);
    const order = activeDay !== 'all' ? getOrder(p.id, activeDay) : null;
    marker.setIcon(createIcon(p.category, order));
    if (dayOk && catOk) { if (!map.hasLayer(marker)) marker.addTo(map); }
    else                 { if (map.hasLayer(marker)) map.removeLayer(marker); }
  });
}

window.filterDay = function(d) {
  activeDay = d;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  if (d === 'all') {
    document.querySelector('.day-btn.all').classList.add('active');
    map.setView([-8.55,115.22], 10);
    if (showRoutes) { Object.keys(routeLayers).forEach(k=>removeRoute(Number(k))); Object.keys(ROUTES).forEach(k=>drawRoute(Number(k))); }
    closePanel();
  } else {
    [...document.querySelectorAll('.day-btn')].find(b=>b.textContent.startsWith(`${d}일`))?.classList.add('active');
    const pts = PLACES.filter(p=>p.day.includes(d));
    if (pts.length) {
      const r = ROUTES[d];
      const allLats = [...pts.map(p=>p.lat), ...(r?r.coords.map(c=>c[0]):[])];
      const allLngs = [...pts.map(p=>p.lng), ...(r?r.coords.map(c=>c[1]):[])];
      map.fitBounds([[Math.min(...allLats)-.03,Math.min(...allLngs)-.03],[Math.max(...allLats)+.03,Math.max(...allLngs)+.03]],{padding:[40,40]});
    }
    if (showRoutes) { Object.keys(routeLayers).forEach(k=>removeRoute(Number(k))); drawRoute(d); }
    openPanel(d);
  }
  updateMarkers();
};

window.toggleCat = function(cat) {
  activeCats.has(cat) ? activeCats.delete(cat) : activeCats.add(cat);
  document.querySelectorAll('.cat-chip').forEach(chip => {
    const m = (chip.getAttribute('onclick')||'').match(/'([^']+)'/);
    if (m && m[1]===cat) chip.classList.toggle('active', activeCats.has(cat));
  });
  updateMarkers();
};

window.toggleRoutes = function() {
  showRoutes = !showRoutes;
  document.getElementById('routeBtn').classList.toggle('active', showRoutes);
  if (showRoutes) { activeDay==='all'?Object.keys(ROUTES).forEach(d=>drawRoute(Number(d))):drawRoute(activeDay); }
  else { Object.keys(routeLayers).forEach(k=>removeRoute(Number(k))); }
};

window.toggleKRW = function() {
  showKRW = !showKRW;
  document.getElementById('krwBtn').classList.toggle('active', showKRW);
  if (panelOpen && activeDay !== 'all') renderPanel(activeDay);
};
</script>
</body>
</html>
